# Ask LLM - Configuration Example
# Copy to default_config.yml or run: ask-llm config init
#
# NOTE: Provider runtime configuration (base_url, api_key, models, etc.)
# is now auto-loaded from providers.yml in your project root.
# You only need to add providers here if you want to override providers.yml
# settings or add providers not listed in providers.yml.
#
# Search order for default_config.yml:
#   --config > ./default_config.yml > ~/.config/ask_llm/ > /etc/ask_llm/ > package built-in
#
# Search order for providers.yml (provider specs / pricing catalog):
#   ASK_LLM_PROVIDERS_YML > ./providers.yml > package root > ~/.config/ask_llm/

# === Optional: Override or add providers ===
# If you need to override a provider from providers.yml, or add a new one:
# providers:
#   my-provider:
#     base_url: "https://api.example.com/v1"
#     api_key: ${MY_API_KEY}
#     default_model: my-model
#     models:
#       - name: my-model
#     timeout: 60.0

# === 1. General/Global Defaults ===
general:
  default_prompt_template: "Please process the following text:\n\n{content}"
  default_output_filename: output.txt
  stream_default: true

# === 2. Translation Defaults ===
translation:
  target_language: zh
  source_language: auto
  style: formal  # formal | casual | technical
  threads: 20                    # Max concurrent API calls per file
  max_parallel_files: 3          # Max files to translate in parallel
  max_concurrent_api_calls: 20    # Alias for threads
  retries: 3
  balance_translation_chunks: true
  max_chunk_tokens: 2400
  preserve_format: true
  include_original: false
  temperature: null              # null uses provider default
  default_prompt_file: null      # null for style-based prompts
  translatable_extensions:
    - ".md"
    - ".markdown"
    - ".txt"
    - ".ipynb"
  recursive_dir: false           # Include subdirectories when translating a directory

# === 3. Batch Processing Defaults ===
batch:
  mode: prompt-content-pairs
  threads: 5
  retries: 3
  retry_delay: 1.0
  retry_delay_max: 10.0
  default_output_format: json
  batch_output_dir: batch_output
  batch_results_dir: batch_results
  output_suffix: _results

# === 4. File Handling ===
file:
  chunk_size: 8192
  default_output_suffix: _output
  translated_suffix: _translated
  formatted_suffix: _formatted
  tqdm_ncols: 80

# === 5. Markdown Heading Formatting ===
format_heading:
  default_prompt_file: "@prompts/md-heading-format.md"
  batch_size: 80
  concurrency: 4
  context_heading_count: 5

# === 6. Markdown Body Formatting ===
format_body:
  default_prompt_file: "@prompts/md-body-format.md"
  max_chunk_tokens: 2400
  concurrency: 4

# === 7. Text Splitter ===
text_splitter:
  max_chunk_size: 2000

# === 8. Token Counting ===
token:
  default_encoding: cl100k_base

# === 9. Paper explanation (ask-llm paper) ===
paper:
  default_run: all
  output_subdir: explain
  prompt_dir: "@prompts/paper"
  pipeline_config: "@prompts/paper-explain-pipeline.yml"
  concurrency: 20
  max_output_tokens: 65536
  full_model: deepseek-reasoner
  request_timeout_seconds: 600.0

# === 10. Project Root Markers (for @ path resolution) ===
project_root_markers:
  - pyproject.toml
  - setup.py
  - .git
  - default_config.yml
