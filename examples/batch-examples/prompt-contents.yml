provider-models:
  - provider: deepseek
    models:
      - model: deepseek-chat
        max_tokens: 64000
        temperature: 0.1
        top_p: 0.1
prompt: 你是一个高中数学老师，请帮我解决以下问题：
contents:
  # 新格式：使用字典格式指定输出文件名和内容
  - output: 题目1.md
    content: 题目：已知函数f(x) = x^2 + 2x + 1，求f(x)的导数。
  - output: 题目2.md
    content: 题目：已知函数f(x) = x^2 + 3x + 1，求f(x)的导数。
  # 向后兼容：仍然支持字符串格式（不指定输出文件名）
  - 题目：已知函数f(x) = x^2 + 4x + 1，求f(x)的导数。
