providers:
  deepseek:
    base_url: "https://api.deepseek.com/v1"
    api_key: ${DEEPSEEK_API_KEY}
    default_model: "deepseek-chat"
    models:
      - name: "deepseek-chat"
        context_length: 128000
        max_output:
          default: 4096
          maximum: 8192
        speed_tokens_per_second: 30
        token_per_character:
          english: 0.3
          chinese: 0.6
        pricing_per_million_tokens: # 人民币/元
          input: 2 # ￥/百万，cache miss
          input_cache_hit: 0.2 # ￥/百万
          output: 3 # ￥/百万
        functions:
          json_output: true
      - name: "deepseek-reasoner"
        context_length: 128000
        max_output:
          default: 4096
          maximum: 65536   # API allows max_tokens up to 65536 for this model (chat is 8192)
        speed_tokens_per_second: 30
        token_per_character:
          english: 0.3
          chinese: 0.6
        pricing_per_million_tokens: # 人民币/元
          input: 2 # ￥/百万，cache miss
          input_cache_hit: 0.2 # ￥/百万
          output: 3 # ￥/百万
        functions:
          json_output: true

  kimi:
    base_url: "https://api.kimi.com/coding/v1"
    api_key: ${KIMI_CODE_API_KEY}
    default_model: "kimi-k2-0711-preview"
    models:
      - name: "kimi-k2-0711-preview"
        context_length: 256000
        max_output:
          default: 8000
          maximum: 32000
        speed_tokens_per_second: 40
        token_per_character:
          english: 0.3
          chinese: 0.6
        pricing_per_million_tokens: # 人民币/元
          input: 3 # ￥/百万
          output: 6 # ￥/百万
        functions:
          json_output: true
      - name: "kimi-k2-0711-preview-longcontext"
        context_length: 2000000
        max_output:
          default: 8000
          maximum: 32000
        speed_tokens_per_second: 30
        token_per_character:
          english: 0.3
          chinese: 0.6
        pricing_per_million_tokens: # 人民币/元
          input: 5 # ￥/百万
          output: 10 # ￥/百万
        functions:
          json_output: true
      - name: "kimi-k2.5-preview"
        context_length: 256000
        max_output:
          default: 8000
          maximum: 32000
        speed_tokens_per_second: 50
        token_per_character:
          english: 0.3
          chinese: 0.6
        pricing_per_million_tokens: # 人民币/元
          input: 2 # ￥/百万
          output: 4 # ￥/百万
        functions:
          json_output: true
