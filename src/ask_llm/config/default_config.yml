# Ask LLM - Built-in Default Configuration (package fallback)
#
# NOTE: Provider runtime configuration (base_url, api_key, models, etc.)
# is now auto-loaded from providers.yml in your project root.
# This file only needs to contain overrides or non-provider settings.
#
# Search order for default_config.yml:
#   --config > ./default_config.yml > ~/.config/ask_llm/ > /etc/ask_llm/ > package built-in
#
# Search order for providers.yml:
#   ASK_LLM_PROVIDERS_YML > ./providers.yml > package root > ~/.config/ask_llm/

# === 1. General/Global Defaults ===
general:
  default_prompt_template: "Please process the following text:\n\n{content}"
  default_output_filename: output.txt
  stream_default: true

# === 2. Translation Defaults ===
translation:
  target_language: zh
  source_language: auto
  style: formal
  threads: 32                    # Single-file concurrent API calls (max_concurrent_api_calls)
  max_parallel_files: 3          # Max files processed in parallel when translating a directory
  max_concurrent_api_calls: 32   # Per-file concurrent API calls (alias for threads)
  retries: 3
  balance_translation_chunks: true   # split/merge by tiktoken so parallel requests are similar cost
  max_chunk_tokens: 6000            # target max body tokens per chunk after rebalance
  max_output_tokens: 8192           # completion cap per chunk (avoid truncation vs llm_engine default 2000)
  min_chunk_merge_tokens: 3000        # unused (compat); bodies merge if combined ≤ max_chunk_tokens
  preserve_format: true
  include_original: false
  temperature: null             # null uses provider default
  default_prompt_file: null       # null for style-based prompts
  translatable_extensions:
    - ".md"
    - ".markdown"
    - ".txt"
    - ".ipynb"
  recursive_dir: false          # Include subdirectories when translating a directory

# === 3. Batch Processing Defaults ===
batch:
  mode: prompt-content-pairs
  threads: 20
  retries: 3
  retry_delay: 1.0
  retry_delay_max: 10.0
  default_output_format: json
  batch_output_dir: batch_output
  batch_results_dir: batch_results
  output_suffix: _results

# === 4. File Handling ===
file:
  chunk_size: 8192
  default_output_suffix: _output
  translated_suffix: _trans
  formatted_suffix: _formatted
  tqdm_ncols: 80

# === 5. Markdown Heading Formatting ===
format_heading:
  default_prompt_file: "@prompts/md-heading-format.md"
  batch_size: 160
  concurrency: 8
  context_heading_count: 5
  retries: 3
  retry_delay: 1.0
  retry_delay_max: 10.0

# === 6. Markdown Body Formatting ===
format_body:
  default_prompt_file: "@prompts/md-body-format.md"
  max_chunk_tokens: 2400
  concurrency: 32
  retries: 3
  retry_delay: 1.0
  retry_delay_max: 10.0

# === 7. Text Splitter ===
text_splitter:
  max_chunk_size: 2000

# === 8. Token Counting ===
token:
  default_encoding: cl100k_base

# === 9. Paper explanation (ask-llm paper) ===
paper:
  default_run: all              # sections | full | all
  output_subdir: explain
  prompt_dir: "@prompts/paper"
  pipeline_config: "@prompts/paper-explain-pipeline.yml"  # job key → prompt file mapping
  concurrency: 32                # parallel LLM calls (I/O-bound; cap to respect rate limits)
  max_output_tokens: 65536         # clamped per model by providers.yml max_output.maximum
  full_model: deepseek-reasoner    # full-text job only; saves reasoning_content when API returns it
  request_timeout_seconds: 600.0  # HTTP timeout (default provider timeout is often 60s; reasoner needs more)

# === 10. Project Root Markers ===
project_root_markers:
  - pyproject.toml
  - setup.py
  - .git
  - default_config.yml
